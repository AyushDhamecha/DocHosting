name: Deploy static content to Pages

on:
  push:
    branches: ["main", "temp"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact (main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Upload artifact (temp branch to staging)
        if: github.ref == 'refs/heads/temp'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'staging'  # This will deploy to a different directory
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
